<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WordQuest</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #1a1a2e;
color: #ffffff;
font-family: Arial, Helvetica, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
}

.screen { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; }
.screen.active { display: flex; }

/* ===== HOME ===== */
#home {
min-height: 100vh;
justify-content: center;
padding: 40px 20px;
gap: 28px;
}

.logo {
font-size: 52px;
font-weight: 900;
text-align: center;
letter-spacing: 3px;
color: #ffffff;
}

.logo span.w { color: #4caf50; }
.logo span.o { color: #f5c518; }
.logo span.r { color: #e94560; }
.logo span.d { color: #4db8ff; }

.tagline {
color: #aaaaaa;
font-size: 13px;
text-align: center;
letter-spacing: 3px;
text-transform: uppercase;
font-weight: bold;
margin-top: -18px;
}

.level-badge {
background: #16213e;
border: 2px solid #0f3460;
border-radius: 16px;
padding: 20px 40px;
text-align: center;
width: 100%;
}

.level-badge .lnum {
font-size: 52px;
font-weight: 900;
color: #e94560;
line-height: 1;
}

.level-badge .ltxt {
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: #aaaaaa;
font-weight: bold;
margin-top: 4px;
}

.stars-row {
font-size: 22px;
margin-top: 8px;
letter-spacing: 4px;
}

.diff-label {
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: #aaaaaa;
text-align: center;
font-weight: bold;
width: 100%;
}

.diff-buttons { display: flex; gap: 10px; width: 100%; }

.diff-btn {
flex: 1;
padding: 16px 6px;
border-radius: 12px;
font-family: Arial, Helvetica, sans-serif;
font-weight: 900;
font-size: 13px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
border: 2px solid transparent;
transition: transform 0.1s;
}

.diff-btn .dicon { font-size: 26px; }
.diff-btn .dsub { font-size: 10px; opacity: 0.8; }

.diff-btn.easy { background: #1b3a2a; color: #4caf50; border-color: #4caf50; }
.diff-btn.medium { background: #3a2e00; color: #f5c518; border-color: #f5c518; }
.diff-btn.hard { background: #3a0010; color: #e94560; border-color: #e94560; }
.diff-btn.selected { transform: scale(1.06); }

.play-btn {
width: 100%;
padding: 20px;
background: #e94560;
border: none;
border-radius: 16px;
color: white;
font-family: Arial, Helvetica, sans-serif;
font-size: 24px;
font-weight: 900;
letter-spacing: 3px;
cursor: pointer;
}

/* ===== GAME ===== */
#game { min-height: 100vh; padding-bottom: 20px; }

.game-header {
width: 100%;
padding: 14px 16px 12px;
display: flex;
align-items: center;
justify-content: space-between;
background: #16213e;
border-bottom: 2px solid #0f3460;
}

.back-btn {
background: #0f3460;
border: none;
color: #ffffff;
font-size: 20px;
font-weight: bold;
cursor: pointer;
padding: 6px 14px;
border-radius: 8px;
font-family: Arial, Helvetica, sans-serif;
}

.game-title-h {
font-size: 20px;
font-weight: 900;
letter-spacing: 2px;
color: #ffffff;
}

.game-meta { text-align: right; }

.diff-badge {
display: inline-block;
font-size: 10px;
font-weight: 900;
letter-spacing: 2px;
padding: 2px 10px;
border-radius: 20px;
text-transform: uppercase;
}

.diff-badge.easy { background: rgba(76,175,80,0.2); color: #4caf50; border: 1px solid #4caf50; }
.diff-badge.medium { background: rgba(245,197,24,0.2); color: #f5c518; border: 1px solid #f5c518; }
.diff-badge.hard { background: rgba(233,69,96,0.2); color: #e94560; border: 1px solid #e94560; }

.tries-left {
font-size: 12px;
color: #aaaaaa;
font-weight: bold;
margin-top: 2px;
}

.grid-wrap {
padding: 20px 16px 8px;
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
width: 100%;
}

.g-row {
display: flex;
flex-direction: row;
gap: 6px;
}

.tile {
width: 58px;
height: 58px;
border: 2px solid #0f3460;
border-radius: 8px;
background: #16213e;
display: flex;
align-items: center;
justify-content: center;
font-size: 28px;
font-weight: 900;
font-family: Arial, Helvetica, sans-serif;
color: #ffffff;
text-transform: uppercase;
}

.tile.filled { border-color: #aaaaaa; }
.tile.correct { background: #4caf50; border-color: #4caf50; color: #ffffff; }
.tile.present { background: #f5c518; border-color: #f5c518; color: #1a1a2e; }
.tile.absent { background: #3a3a3a; border-color: #3a3a3a; color: #888888; }

@keyframes shake {
0%,100% { transform: translateX(0); }
20% { transform: translateX(-6px); }
40% { transform: translateX(6px); }
60% { transform: translateX(-4px); }
80% { transform: translateX(4px); }
}
.shake { animation: shake 0.35s ease; }

.msg-bar {
min-height: 28px;
text-align: center;
font-size: 14px;
font-weight: bold;
color: #ffffff;
padding: 4px 16px;
letter-spacing: 1px;
width: 100%;
}

.keyboard {
width: 100%;
padding: 6px 6px 0;
display: flex;
flex-direction: column;
gap: 6px;
}

.kb-row {
display: flex;
justify-content: center;
gap: 5px;
}

.key {
height: 50px;
min-width: 30px;
flex: 1;
max-width: 40px;
background: #0f3460;
border: none;
border-radius: 6px;
color: #ffffff;
font-family: Arial, Helvetica, sans-serif;
font-weight: 900;
font-size: 14px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}

.key.wide { max-width: 58px; font-size: 11px; }
.key:active { opacity: 0.7; }
.key.correct { background: #4caf50; color: #ffffff; }
.key.present { background: #f5c518; color: #1a1a2e; }
.key.absent { background: #2a2a2a; color: #555555; }

/* ===== RESULT ===== */
#result {
min-height: 100vh;
padding: 40px 24px;
justify-content: center;
gap: 24px;
}

.result-icon { font-size: 64px; text-align: center; }
.result-title { font-size: 36px; font-weight: 900; text-align: center; letter-spacing: 2px; }
.result-word { font-size: 14px; color: #aaaaaa; text-align: center; font-weight: bold; letter-spacing: 1px; }
.result-word .the-word { display: block; font-size: 28px; font-weight: 900; color: #ffffff; letter-spacing: 6px; margin-top: 6px; }

.stars-earned { display: flex; gap: 10px; justify-content: center; font-size: 38px; }

.level-up-box {
background: #16213e;
border: 2px solid #f5c518;
border-radius: 14px;
padding: 16px 24px;
text-align: center;
width: 100%;
display: none;
}

.level-up-box.show { display: block; }
.level-up-box .lu1 { font-size: 22px; font-weight: 900; color: #f5c518; }
.level-up-box .lu2 { font-size: 13px; color: #aaaaaa; margin-top: 4px; }

.res-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }

.btn-main {
width: 100%;
padding: 18px;
background: #e94560;
border: none;
border-radius: 14px;
color: white;
font-family: Arial, Helvetica, sans-serif;
font-size: 20px;
font-weight: 900;
letter-spacing: 2px;
cursor: pointer;
}

.btn-sec {
width: 100%;
padding: 14px;
background: #16213e;
border: 2px solid #0f3460;
border-radius: 14px;
color: #aaaaaa;
font-family: Arial, Helvetica, sans-serif;
font-size: 15px;
font-weight: bold;
cursor: pointer;
}
</style>

</head>
<body>

<!-- HOME -->

<div id="home" class="screen active">
  <div class="logo"><span class="w">W</span><span class="o">O</span><span class="r">R</span><span class="d">D</span>QUEST</div>
  <div class="tagline">Guess the Word</div>

  <div class="level-badge">
    <div class="ltxt">Current Level</div>
    <div class="lnum" id="home-level">1</div>
    <div class="stars-row" id="home-stars">☆☆☆</div>
  </div>

  <div class="diff-label">Choose Difficulty</div>
  <div class="diff-buttons">
    <button class="diff-btn easy selected" onclick="selectDiff('easy')">
      <span class="dicon">🌱</span><span>Easy</span><span class="dsub">8 tries</span>
    </button>
    <button class="diff-btn medium" onclick="selectDiff('medium')">
      <span class="dicon">🔥</span><span>Medium</span><span class="dsub">6 tries</span>
    </button>
    <button class="diff-btn hard" onclick="selectDiff('hard')">
      <span class="dicon">💀</span><span>Hard</span><span class="dsub">4 tries</span>
    </button>
  </div>

<button class="play-btn" onclick="startGame()">PLAY</button>

</div>

<!-- GAME -->

<div id="game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <div class="game-title-h">WORDQUEST</div>
    <div class="game-meta">
      <span class="diff-badge" id="diff-badge">EASY</span>
      <div class="tries-left" id="tries-left">8 tries left</div>
    </div>
  </div>
  <div class="grid-wrap" id="grid"></div>
  <div class="msg-bar" id="msg"></div>
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- RESULT -->

<div id="result" class="screen">
  <div class="result-icon" id="res-icon">🎉</div>
  <div class="result-title" id="res-title">You Got It!</div>
  <div class="stars-earned" id="res-stars"></div>
  <div class="result-word" id="res-word"></div>
  <div class="level-up-box" id="level-up-box">
    <div class="lu1">LEVEL UP!</div>
    <div class="lu2" id="lu-sub">You reached Level 2!</div>
  </div>
  <div class="res-btns">
    <button class="btn-main" onclick="startGame()">PLAY AGAIN</button>
    <button class="btn-sec" onclick="goHome()">Change Difficulty</button>
  </div>
</div>

<script>
const WORDS = {
  easy: ['APPLE','BEACH','BRAIN','BREAD','BRING','BUILD','CARRY','CANDY','CHAIR','CHILD','CLEAN','CLEAR','CLOCK','CLOSE','CLOUD','COLOR','DANCE','DIARY','DRINK','DRIVE','EARTH','FANCY','FEAST','FLAME','FLASH','FLOAT','FLOOR','FOCUS','GRACE','GRAIN','GRAND','GRAPE','GRASS','GREEN','HAPPY','HEART','HEAVY','HONEY','HOTEL','HOUSE','HURRY','JELLY','JUDGE','JUICE','LAUGH','LEARN','LIGHT','LEMON','LEVEL','LUCKY','LUNCH','MAGIC','MAJOR','MARCH','MATCH','MAYBE','MEDAL','MONEY','MONTH','MOUSE','MOVIE','MUSIC','NIGHT','NOISE','NORTH','OCEAN','OLIVE','ONION','PAINT','PAPER','PARTY','PEACE','PENNY','PHONE','PILOT','PIZZA','PLACE','PLANT','PLATE','POINT','POWER','PRESS','PRICE','PRIDE','PRINT','PRIZE','QUEEN','QUEST','QUICK','QUIET','RADIO','RAISE','RANCH','RAPID','REACH','READY','RIGHT','RIVER','ROBOT','ROCKY','ROUGH','ROUND','ROYAL','RULER','SALAD','SEVEN','SHARE','SHARP','SHEEP','SHELF','SHELL','SHIFT','SHIRT','SHINE','SHORE','SHORT','SHOUT','SIGHT','SKILL','SLEEP','SLICE','SLIDE','SMALL','SMART','SMILE','SMOKE','SNACK','SOLAR','SOLID','SOLVE','SOUTH','SPACE','SPARE','SPARK','SPEAK','SPEED','SPEND','SPOON','SPORT','STACK','STAGE','STAMP','STAND','START','STATE','STEAL','STEAM','STEEL','STICK','STILL','STONE','STORE','STORM','STORY','SUGAR','SWEET','TABLE','TEACH','TEETH','THANK','THEME','THINK','TIGER','TODAY','TOOTH','TOTAL','TOUCH','TOUGH','TOWER','TOWEL','TRADE','TRAIL','TRAIN','TRASH','TREAT','TREND','TRIAL','TRICK','TRUCK','TRULY','TRUST','TRUTH','TULIP','UNDER','UNION','UNTIL','UPPER','VALUE','VIDEO','VISIT','VITAL','VOICE','WAGON','WASTE','WATCH','WATER','WHEAT','WHEEL','WHERE','WHITE','WHOLE','WOMAN','WORLD','WORRY','WORTH','WRITE','WRONG','YOUTH','ZEBRA'],
  medium: ['ABIDE','ABYSS','ACORN','ACUTE','AGILE','ALBUM','ALOFT','ALTAR','AMBER','AMBLE','AMPLE','AMUSE','ANGEL','ANKLE','ANNEX','ANVIL','ARMOR','AROMA','AROSE','ARRAY','ASSET','ATTIC','AUDIO','BASIC','BAYOU','BEIGE','BISON','BLAZE','BLEND','BLISS','BLUNT','BOGGY','BRASH','BRAVO','BRAWL','BRISK','BROTH','BUDGE','BULGE','BURLY','CABIN','CAMEL','CARGO','CEDAR','CHAMP','CHAOS','CHARM','CHASM','CHEAT','CHESS','CHIME','CLAMP','CLASP','CLING','CLOAK','COBRA','COMET','COVET','CRAFT','CRANE','CRAVE','CRAWL','CRISP','CRUSH','CURLY','CURVE','DAISY','DECAY','DECOY','DELTA','DEPOT','DERBY','DETOX','DIGIT','DODGE','DRAFT','DRAPE','DREAD','DRONE','DROWN','DWARF','EAGLE','EBONY','EJECT','ELDER','ELITE','EMBER','ENACT','ENTRY','ENVOY','EPOCH','ERODE','EVADE','EVOKE','EXCEL','EXERT','EXUDE','FABLE','FACET','FAINT','FAMED','FATAL','FAUNA','FERRY','FETCH','FEVER','FIEND','FILTH','FLANK','FLARE','FLASK','FLESH','FLICK','FLING','FLIRT','FLOCK','FLOOD','FLUTE','FOAMY','FORTE','FRAIL','FREAK','FRESH','FROTH','FROZE','FUNGI','GAUNT','GAVEL','GECKO','GENIE','GHOST','GIDDY','GIRTH','GLAND','GLARE','GLAZE','GLEAM','GLIDE','GLOOM','GLOSS','GLOVE','GNOME','GREED','GROAN','GROUT','GRUFF','GRUNT','GUILD','GUILE','GUSTO','HASTE','HAUNT','HAVEN','HAVOC','HERON','HINGE','HIPPO','HOARD','HOLLY','HUSKY','IDEAL','IDIOM','INEPT','INERT','IRONY','IVORY','JADED','JOUST','KARMA','KAYAK','KNACK','KNAVE','KNEEL','KNIFE','KNOLL','KUDOS','LANCE','LAPSE','LARVA','LASER','LATCH','LATTE','LEVER','LILAC','LIMBO','LINGO','LIVID','LOBBY','LODGE','LOFTY','LOGIC','LUSTY','LYRIC','MAFIA','MANGO','MANIA','MANOR','MAPLE','MAUVE','MAXIM','MELEE','MERCY','MIMIC','MIRTH','MISER','MOIST','MOOSE','MOSSY','MOTIF','MOURN','MULCH','MURAL','MURKY','MYRRH','NADIR','NAIVE','NASTY','NIFTY','NINJA','NYMPH','OMEGA','OPTIC','ORBIT','OTTER','OXIDE','PAGAN','PATSY','PENAL','PERCH','PETAL','PIXEL','PIXIE','PLAID','PLANK','PLUCK','POLKA','PORCH','PRAWN','PRISM','PROBE','PRONE','PRONG','PROXY','PRUDE','PUPIL','PUTTY','QUACK','QUALM','QUERY','QUIRK','QUOTA','RABBI','RAINY','RAVEN','REALM','RECUR','REGAL','RELAX','RELIC','REMIX','REPEL','RESIN','RIDGE','RIPEN','RISEN','RISKY','RIVET','ROAST','RODEO','ROUGE','ROVER','RUMBA','RUSTY','SAVVY','SCALD','SCALP','SCOFF','SCOLD','SCONE','SCOOP','SCOPE','SCOUT','SCRUB','SEIZE','SERUM','SHAKY','SHAWL','SHEEN','SLEEK','SLEET','SLIME','SLING','SLOTH','SLUMP','SLURP','SNARE','SNARL','SNEAK','SNEER','SNIFF','SNORT','SNOWY','SOGGY','SONIC','SPRIG','SQUAT','SQUID','STALE','STALK','STALL','STARE','STARK','STERN','STIFF','STING','STINK','STOMP','STOVE','STRIP','STUNG','STUNT','SWAMP','SWEAR','SWEAT','SWEPT','SWOOP','TALON','TANGO','TAUNT','TAWNY','TEPID','TERSE','THORN','TIDAL','TIMID','TONIC','TOPAZ','TORSO','TOTEM','TOXIC','TRAMP','TREAD','TRICE','TRILL','TRITE','TROVE','TRUCE','TUBER','TUNER','TUNIC','TUTOR','TWIRL','ULTRA','UMBRA','UNCUT','UNFIT','UNIFY','UNTIE','USHER','VAGUE','VALID','VENOM','VIGIL','VIPER','VISOR','VISTA','VIXEN','VIVID','VOCAL','VODKA','WALTZ','WRATH','WRING','WRIST','YEARN','ZESTY','ZILCH','ZIPPY'],
  hard: ['ABBEY','ABBOT','ABHOR','ABIDE','ABYSS','ACRID','ADAGE','ADOBE','AGAPE','AGONY','AGORA','ALLAY','ALLOT','ALOOF','AMISS','ANNUL','ANTIC','ARDOR','ASKEW','ASPIC','ASSAY','ATONE','AUGUR','AVIAN','AXIOM','AZURE','BALMY','BAWDY','BAYOU','BERTH','BESET','BEVEL','BIGHT','BILGE','BLAND','BLEAT','BLOKE','BLUFF','BOGUS','BRAID','BRAWN','BRAWL','BROOD','BUXOM','BYLAW','CABAL','CACHE','CADGE','CAIRN','CANID','CANNY','CARVE','CASTE','CAVIL','CHAFE','CHAFF','CHIDE','CLEAT','CLEFT','CLING','CLOUT','CLUMP','COMELY','CRASS','CREAK','CROAK','CRYPT','CURIO','CYNIC','DATUM','DAUNT','DEMUR','DETER','DICEY','DINGY','DIRGE','DIVOT','DOLCE','DROLL','DUSKY','EERIE','ELUDE','EMERY','ENVOY','EPOXY','EVADE','EXERT','EXPEL','EXULT','EXTOL','FEIGN','FETID','FIERY','FILCH','FJORD','FLECK','FLOUT','FLUNK','FORGO','FORTE','FROND','GAUDY','GAUNT','GAUZE','GAWKY','GIDDY','GIMLET','GLEAN','GLOAT','GOUGE','GUILE','GUSTY','INANE','INFER','INGOT','INURE','IRATE','JAUNT','JOUST','KARMA','KNAVE','KUDOS','LACKEY','LADEN','LAPSE','LEACH','LIEGE','LIMN','LITHE','LOFTY','LUMPY','LURK','LUSTY','MALIGN','MANOR','MANTLE','MAUVE','MELEE','MEWL','MINCE','MIRTH','MOODY','MORPH','MOTLEY','MURKY','MYRRH','NADIR','NETTLE','NICHE','NOBLE','OBTUSE','ODIOUS','OPAQUE','ORDEAL','PAGAN','PARCH','PARIAH','PATHOS','PAUPER','PEEVE','PENAL','PETTY','PITHY','PLIANT','PLUMB','PREEN','PRUDE','PYGMY','QUALM','RANCOR','RANKLE','REBUKE','RECANT','RELISH','REMISS','REPEAL','REVEL','RIVET','RUEFUL','RUMPLE','RUSE','SATIRE','SCORN','SCOUT','SEEDY','SHIRK','SHORN','SIMPER','SKIFF','SKULK','SLAKE','SLEUTH','SLOTH','SMIRK','SMITE','SNAG','SNARL','SODDEN','SOLEMN','SORDID','SPATE','SPECK','SPURN','STAID','STINGY','STOIC','STREW','SUBDUE','SULLEN','SULTRY','SUNDRY','SUPINE','SURLY','SWARD','SWATH','TACIT','TAINT','TALON','TAWDRY','TERSE','THWART','TIRADE','TORRID','TRYST','TUMULT','TURGID','UNRULY','USURP','VEXED','VIABLE','VILIFY','VIRILE','VIVID','VOGUE','WAIF','WRATH','WREST','WRING','WRITHE','YEOMAN','ZEALOT']
};

let S = {
  level: parseInt(localStorage.getItem('wq_level') || '1'),
  stars: parseInt(localStorage.getItem('wq_stars') || '0'),
  diff: 'easy', word: '', guesses: [], cur: '',
  maxT: 8, done: false, keys: {}
};

function tries(d) { return d==='easy'?8:d==='medium'?6:4; }
function rnd(a) { return a[Math.floor(Math.random()*a.length)]; }
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function goHome() {
  document.getElementById('home-level').textContent = S.level;
  const s = S.stars % 3 || (S.stars > 0 ? 3 : 0);
  document.getElementById('home-stars').textContent = '⭐'.repeat(Math.min(s,3)) + '☆'.repeat(3-Math.min(s,3));
  show('home');
}

function selectDiff(d) {
  S.diff = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector('.diff-btn.'+d).classList.add('selected');
}

function startGame() {
  S.word = rnd(WORDS[S.diff]);
  S.guesses = []; S.cur = ''; S.maxT = tries(S.diff); S.done = false; S.keys = {};

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r=0; r<S.maxT; r++) {
    const row = document.createElement('div');
    row.className = 'g-row'; row.id = 'row'+r;
    for (let c=0; c<5; c++) {
      const t = document.createElement('div');
      t.className = 'tile'; t.id = 'tile'+r+c;
      row.appendChild(t);
    }
    grid.appendChild(row);
  }

  const KB = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','DEL']];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB.forEach(row => {
    const r = document.createElement('div'); r.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key'+(k.length>1?' wide':'');
      btn.textContent = k; btn.id = 'key-'+k;
      btn.onclick = () => handleKey(k);
      r.appendChild(btn);
    });
    kb.appendChild(r);
  });

  const badge = document.getElementById('diff-badge');
  badge.textContent = S.diff.toUpperCase(); badge.className = 'diff-badge '+S.diff;
  document.getElementById('tries-left').textContent = S.maxT+' tries left';
  document.getElementById('msg').textContent = '';
  show('game');
}

function renderCur() {
  const r = S.guesses.length;
  for (let c=0; c<5; c++) {
    const t = document.getElementById('tile'+r+c);
    const ch = S.cur[c]||'';
    t.textContent = ch;
    t.className = 'tile'+(ch?' filled':'');
  }
}

function evaluate(guess) {
  const res=Array(5).fill('absent'), ans=S.word.split(''), g=guess.split(''), used=Array(5).fill(false);
  for (let i=0;i<5;i++) { if(g[i]===ans[i]){res[i]='correct';used[i]=true;} }
  for (let i=0;i<5;i++) { if(res[i]==='correct')continue; for(let j=0;j<5;j++){if(!used[j]&&g[i]===ans[j]){res[i]='present';used[j]=true;break;}} }
  return res;
}

function reveal(guess, ri) {
  const res = evaluate(guess);
  res.forEach((r,c) => {
    setTimeout(() => {
      const t = document.getElementById('tile'+ri+c);
      t.className = 'tile '+r;
      const k = guess[c];
      if (r==='correct'||(r==='present'&&S.keys[k]!=='correct')||(r==='absent'&&!S.keys[k])) S.keys[k]=r;
      const ke = document.getElementById('key-'+k);
      if (ke) ke.className = 'key '+S.keys[k];
    }, c*90);
  });
  return res;
}

function msg(txt, ms=1400) {
  const el=document.getElementById('msg'); el.textContent=txt;
  if (ms) setTimeout(()=>{if(el.textContent===txt)el.textContent='';},ms);
}

function shake(r) {
  const row=document.getElementById('row'+r); if(!row)return;
  row.classList.add('shake');
  row.addEventListener('animationend',()=>row.classList.remove('shake'),{once:true});
}

function handleKey(k) {
  if (S.done) return;
  if (k==='DEL'||k==='BACKSPACE') { S.cur=S.cur.slice(0,-1); renderCur(); return; }
  if (k==='ENTER') {
    if (S.cur.length<5) { msg('Need 5 letters!'); shake(S.guesses.length); return; }
    const guess=S.cur, ri=S.guesses.length;
    S.guesses.push(guess); S.cur='';
    const res=reveal(guess,ri);
    const left=S.maxT-S.guesses.length;
    document.getElementById('tries-left').textContent=left+(left===1?' try left':' tries left');
    const won=res.every(r=>r==='correct');
    if (won) { S.done=true; setTimeout(()=>showResult(true,ri+1),5*90+300); }
    else if (S.guesses.length>=S.maxT) { S.done=true; setTimeout(()=>showResult(false),5*90+300); }
    return;
  }
  if (/^[A-Z]$/.test(k)&&S.cur.length<5) { S.cur+=k; renderCur(); }
}

document.addEventListener('keydown', e=>{
  if(e.key==='Backspace')handleKey('BACKSPACE');
  else if(e.key==='Enter')handleKey('ENTER');
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
});

function starsFor(a,max,diff) {
  const r=a/max;
  return diff==='hard'?(r<=0.5?3:r<=0.75?2:1):(r<=0.33?3:r<=0.66?2:1);
}

function showResult(won, gc) {
  let earned=0, prev=S.level;
  if (won) {
    earned=starsFor(gc,S.maxT,S.diff);
    S.stars+=earned; S.level=Math.floor(S.stars/3)+1;
    localStorage.setItem('wq_level',S.level); localStorage.setItem('wq_stars',S.stars);
  }
  document.getElementById('res-icon').textContent=won?'🎉':'😢';
  document.getElementById('res-title').textContent=won?(gc<=2?'BRILLIANT!':gc<=4?'GREAT JOB!':'YOU GOT IT!'):'NICE TRY!';
  const rw=document.getElementById('res-word');
  rw.innerHTML=won?`Solved in ${gc} ${gc===1?'try':'tries'}<span class="the-word">${S.word}</span>`:`The word was<span class="the-word">${S.word}</span>`;
  const se=document.getElementById('res-stars'); se.innerHTML='';
  for(let i=0;i<3;i++) se.innerHTML+=i<earned?'⭐':'☆';
  const lub=document.getElementById('level-up-box');
  if(won&&S.level>prev){lub.classList.add('show');document.getElementById('lu-sub').textContent='You reached Level '+S.level+'!';}
  else lub.classList.remove('show');
  show('result');
}

goHome();
</script>
